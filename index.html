<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTechHub | Premium Multi-Page Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-glow { background: radial-gradient(circle at center, #1e40af 0%, transparent 70%); }
    </style>
</head>
<body class="blue-glow min-h-screen">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto sticky top-0 z-50 glass rounded-full mt-4 mx-4">
        <div class="text-2xl font-bold text-blue-500">POWERTECHHUB</div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="index.html" class="text-blue-400 font-bold">Home</a>
            <a href="about.html" class="hover:text-blue-400 transition">About</a>
            <a href="services.html" class="hover:text-blue-400 transition">Services</a>
            <a href="contact.html" class="hover:text-blue-400 transition">Contact</a>
        </div>
        <a href="https://wa.me/918619436849" class="bg-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition">WhatsApp</a>
    </nav>

    <section class="text-center py-24 px-4">
        <div class="inline-block px-4 py-1 border border-blue-500/30 rounded-full text-blue-400 text-xs font-bold mb-6 tracking-widest uppercase">Premium Template</div>
        <h1 class="text-5xl md:text-8xl font-extrabold mb-6 italic text-blue-500 tracking-tight">Built for Growth.</h1>
        <div class="inline-flex items-center gap-2 bg-green-900/30 text-green-400 px-6 py-2 rounded-xl border border-green-500/30">
            <span class="text-2xl font-bold">99/100</span>
            <span class="text-xs font-bold uppercase tracking-wider">PageSpeed Score</span>
        </div>
    </section>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <h2 class="text-center text-3xl font-bold mb-12">Our Projects</h2>
        <div class="grid md:grid-cols-2 gap-10">
            <div class="rounded-3xl overflow-hidden glass aspect-video relative group border border-white/10">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-500">
                <div class="absolute inset-0 flex items-center justify-center font-bold text-2xl tracking-tight">Tech Dashboard</div>
            </div>
            <div class="rounded-3xl overflow-hidden glass aspect-video relative group border border-white/10">
                <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=800" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-500">
                <div class="absolute inset-0 flex items-center justify-center font-bold text-2xl tracking-tight">Creative Agency</div>
            </div>
        </div>
    </section>

    <section class="max-w-xl mx-auto py-20 px-6" id="contact">
        <div class="glass p-10 rounded-3xl border border-blue-500/20 shadow-2xl">
            <h2 class="text-3xl font-bold mb-8 text-center text-blue-400">Get a Free Quote</h2>
            <form action="https://formspree.io/f/mreogagd" method="POST" class="space-y-5">
                <input type="text" name="name" placeholder="Full Name" required class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:border-blue-500 outline-none transition">
                <input type="email" name="email" placeholder="Email Address" required class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:border-blue-500 outline-none transition">
                <textarea name="message" placeholder="Project Details" rows="4" required class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:border-blue-500 outline-none transition"></textarea>
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="text-center py-12 text-slate-600 border-t border-white/5 mt-10">
        <p class="text-sm tracking-widest uppercase font-semibold">&copy; 2026 PowerTechHub Agency.</p>
    </footer>

</body>
</html>
