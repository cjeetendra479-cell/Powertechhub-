<!DOCTYPE html
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTechHub | High-End Web Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-glow { background: radial-gradient(circle at center, #1e40af 0%, transparent 70%); }
    </style>
</head>
<body class="blue-glow min-h-screen">
    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold text-blue-500">POWERTECHHUB</div>
        <a href="https://wa.me/918619436849" class="bg-blue-600 px-6 py-2 rounded-full font-bold">Hire Us</a>
    </nav>

    <section class="text-center py-20 px-4">
        <div class="inline-block px-4 py-1 border border-blue-500/30 rounded-full text-blue-400 text-xs font-bold mb-6">AVAILABLE FOR SALE</div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 italic text-blue-500">Built for Growth.</h1>
        <div class="inline-flex items-center gap-2 bg-green-900/30 text-green-400 px-4 py-2 rounded-lg border border-green-500/30 mb-8">
            <span class="text-xl font-bold">99/100</span>
            <span class="text-xs font-bold uppercase tracking-widest">PageSpeed Score</span>
        </div>
    </section>

    <section class="max-w-6xl mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold text-center mb-10">Our Latest Creations</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="rounded-3xl overflow-hidden glass aspect-video relative group">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800" class="w-full h-full object-cover opacity-70">
                <div class="absolute inset-0 flex items-center justify-center font-bold text-xl">Tech Dashboard</div>
            </div>
            <div class="rounded-3xl overflow-hidden glass aspect-video relative group">
                <img src="https://images.unsplash.com/photo-1551288049-bbbda536339a?w=800" class="w-full h-full object-cover opacity-70">
                <div class="absolute inset-0 flex items-center justify-center font-bold text-xl">Creative Agency</div>
            </div>
        </div>
    </section>

    <section class="max-w-xl mx-auto py-20 px-4">
        <div class="glass p-8 rounded-3xl border-blue-500/30">
            <h2 class="text-2xl font-bold mb-6 text-center">Get a Free Quote (Email Us)</h2>
            <form action="https://formspree.io/f/xvgzlowy" method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="Name" required class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl outline-none focus:border-blue-500">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl outline-none focus:border-blue-500">
                <textarea name="message" placeholder="Project Details" rows="4" required class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Send To My Gmail</button>
            </form>
        </div>
    </section>

    <footer class="text-center py-10 text-gray-600 border-t border-gray-900 mt-10">
        <p>© 2026 PowerTechHub Agency.</p>
    </footer>
</body>
</html>
